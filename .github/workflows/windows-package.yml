name: Windows Package

on:
  workflow_dispatch:
  push:
    branches:
      - windows

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build-windows `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DSPATIALROOT_BUILD_GUI=ON `
            -DSPATIALROOT_BUILD_ENGINE=ON `
            -DSPATIALROOT_BUILD_OFFLINE=ON `
            -DSPATIALROOT_BUILD_CULT=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build-windows --config Release --parallel

      - name: Install staged package
        shell: pwsh
        run: |
          cmake --install build-windows `
            --config Release `
            --component SpatialRootRuntime `
            --prefix "$PWD/stage"

      - name: Verify staged package contents
        shell: pwsh
        run: |
          $root = "$PWD/stage"
          Write-Host "=== Staged package tree ==="
          Get-ChildItem -Recurse $root | Select-Object FullName

          if (!(Test-Path "$root/SpatialRoot.exe")) {
            throw "Missing SpatialRoot.exe"
          }
          if (!(Test-Path "$root/spatialroot_spatial_render.exe")) {
            throw "Missing spatialroot_spatial_render.exe"
          }
          if (!(Test-Path "$root/cult-transcoder.exe")) {
            throw "Missing cult-transcoder.exe"
          }
          if (!(Test-Path "$root/resources")) {
            throw "Missing resources directory"
          }
          if (!(Test-Path "$root/resources/speaker_layouts")) {
            throw "Missing resources/speaker_layouts"
          }
          Write-Host "=== Staged package verification passed ==="

      - name: Package ZIP
        shell: pwsh
        run: |
          cpack --config build-windows/CPackConfig.cmake -G ZIP -C Release

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpatialRoot-alpha-v1-windows-x64
          path: "*.zip"
